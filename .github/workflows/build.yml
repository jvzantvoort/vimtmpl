# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Build

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
    - name: Check out code
      uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v7
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Build for ${{ matrix.goos }}/${{ matrix.goarch }}
      run: |
        CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -v -o build/vimtmpl-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/vimtmpl

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: vimtmpl-${{ matrix.goos }}-${{ matrix.goarch }}
        path: build/vimtmpl-${{ matrix.goos }}-${{ matrix.goarch }}
        retention-days: 7
